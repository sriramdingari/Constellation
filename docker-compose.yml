services:
  constellation-api:
    build: .
    command: uvicorn constellation.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - repos:/app/repos
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

  constellation-worker:
    build: .
    command: celery -A constellation.worker.celery_app worker --loglevel=info
    env_file: .env
    volumes:
      - repos:/app/repos
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

  flower:
    build: .
    command: celery -A constellation.worker.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/constellation
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "neo4j status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  neo4j_data:
  repos:
